name: brokergate

services:
  api:
    build: .
    restart: unless-stopped
    environment:
      BROKERGATE_ENV: ${BROKERGATE_ENV:-local}
      BROKERGATE_API_KEY: ${BROKERGATE_API_KEY:-change-me}
      BROKERGATE_CONFIRMATION_REQUIRED: ${BROKERGATE_CONFIRMATION_REQUIRED:-true}
      BROKERGATE_BROKER_MODE: ${BROKERGATE_BROKER_MODE:-paper}
      BROKERGATE_TIGER_ENABLED: ${BROKERGATE_TIGER_ENABLED:-false}
      BROKERGATE_TIGER_ACCOUNT: ${BROKERGATE_TIGER_ACCOUNT:-}
      BROKERGATE_TIGER_ID: ${BROKERGATE_TIGER_ID:-}
      BROKERGATE_TIGER_LICENSE: ${BROKERGATE_TIGER_LICENSE:-}
      BROKERGATE_TIGER_PRIVATE_KEY_PATH: ${BROKERGATE_TIGER_PRIVATE_KEY_PATH:-}
      BROKERGATE_TIGER_CONFIG_DIR: ${BROKERGATE_TIGER_CONFIG_DIR:-}
      BROKERGATE_TIGER_TOKEN_PATH: ${BROKERGATE_TIGER_TOKEN_PATH:-}
      BROKERGATE_LONGBRIDGE_ENABLED: ${BROKERGATE_LONGBRIDGE_ENABLED:-false}
      BROKERGATE_LONGBRIDGE_APP_KEY: ${BROKERGATE_LONGBRIDGE_APP_KEY:-}
      BROKERGATE_LONGBRIDGE_APP_SECRET: ${BROKERGATE_LONGBRIDGE_APP_SECRET:-}
      BROKERGATE_LONGBRIDGE_ACCESS_TOKEN: ${BROKERGATE_LONGBRIDGE_ACCESS_TOKEN:-}
      BROKERGATE_LONGBRIDGE_ACCOUNT: ${BROKERGATE_LONGBRIDGE_ACCOUNT:-}
      BROKERGATE_LONGBRIDGE_HTTP_URL: ${BROKERGATE_LONGBRIDGE_HTTP_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
