name: Web Vercel

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-vercel.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-vercel.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: web-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel
        shell: bash
        env:
          VERCEL_TOKEN_CONFIGURED: ${{ secrets.VERCEL_TOKEN != '' }}
          VERCEL_ORG_ID_CONFIGURED: ${{ secrets.VERCEL_ORG_ID != '' }}
          VERCEL_PROJECT_ID_CONFIGURED: ${{ secrets.VERCEL_PROJECT_ID != '' }}
        run: |
          if [ "$VERCEL_TOKEN_CONFIGURED" = "true" ] && [ "$VERCEL_ORG_ID_CONFIGURED" = "true" ] && [ "$VERCEL_PROJECT_ID_CONFIGURED" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel preview deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
          fi

      - name: Setup Node
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        if: steps.vercel.outputs.configured == 'true'
        run: npm install -g vercel@50.28.0

      - name: Pull Vercel preview environment
        if: steps.vercel.outputs.configured == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --cwd web

      - name: Build preview
        if: steps.vercel.outputs.configured == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd web

      - name: Deploy preview
        if: steps.vercel.outputs.configured == 'true'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --cwd web | tail -n1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `BrokerGate web preview: ${{ steps.deploy.outputs.url }}`
            })

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel
        shell: bash
        env:
          VERCEL_TOKEN_CONFIGURED: ${{ secrets.VERCEL_TOKEN != '' }}
          VERCEL_ORG_ID_CONFIGURED: ${{ secrets.VERCEL_ORG_ID != '' }}
          VERCEL_PROJECT_ID_CONFIGURED: ${{ secrets.VERCEL_PROJECT_ID != '' }}
        run: |
          if [ "$VERCEL_TOKEN_CONFIGURED" = "true" ] && [ "$VERCEL_ORG_ID_CONFIGURED" = "true" ] && [ "$VERCEL_PROJECT_ID_CONFIGURED" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel production deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
          fi

      - name: Setup Node
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        if: steps.vercel.outputs.configured == 'true'
        run: npm install -g vercel@50.28.0

      - name: Pull Vercel production environment
        if: steps.vercel.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd web

      - name: Build production
        if: steps.vercel.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd web

      - name: Deploy production
        if: steps.vercel.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd web
